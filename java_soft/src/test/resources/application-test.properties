# Test Configuration for Oracle Environment
spring.datasource.url=jdbc:h2:mem:testdb;MODE=Oracle;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA Configuration for testing
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Disable Oracle-specific features for testing
oracle.middleware.soa.enabled=false
oracle.middleware.osb.enabled=false
oracle.enterprise.adf.enabled=false

# Security Configuration
turbo.asset.security.jwt.secret=testSecretKey
turbo.asset.security.jwt.expiration=86400000

# Use HikariCP for tests too
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=2

# Logging
logging.level.com.harborgrid.turboasset=DEBUG
logging.level.org.springframework.web=DEBUG