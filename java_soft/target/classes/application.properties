# Oracle Database Configuration (using HikariCP for development)
spring.datasource.url=jdbc:oracle:thin:@//localhost:1521/XEPDB1
spring.datasource.username=turbo_asset
spring.datasource.password=password
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# HikariCP Configuration (Oracle optimized)
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA/Hibernate Configuration for Oracle
spring.jpa.database-platform=org.hibernate.dialect.Oracle12cDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# Oracle specific Hibernate properties
spring.jpa.properties.hibernate.connection.provider_class=org.hibernate.hikaricp.internal.HikariCPConnectionProvider
spring.jpa.properties.hibernate.dialect.oracle.prefer_long_raw=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# Application Configuration
server.port=8080
server.servlet.context-path=/turbo-asset
server.servlet.session.timeout=30m
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json

# WebLogic Server Configuration
server.servlet.jsp.init-parameters.development=false
server.servlet.jsp.init-parameters.compiler-target-vm=17
server.servlet.jsp.init-parameters.compiler-source-vm=17

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=NON_NULL

# Security Configuration
turbo.asset.security.jwt.secret=mySecretKey
turbo.asset.security.jwt.expiration=86400000
turbo.asset.security.cors.allowed-origins=*
turbo.asset.security.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
turbo.asset.security.cors.allowed-headers=*

# Cache Configuration (Oracle Coherence compatible)
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=5m

# Oracle WebLogic Work Manager Configuration
turbo.asset.workmanager.default.min-threads=5
turbo.asset.workmanager.default.max-threads=25
turbo.asset.workmanager.integration.min-threads=2
turbo.asset.workmanager.integration.max-threads=10

# Internationalization
spring.messages.basename=messages/messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

# File Upload Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB
spring.servlet.multipart.enabled=true

# Oracle Middleware Integration
oracle.middleware.soa.enabled=true
oracle.middleware.soa.endpoint=http://localhost:8001/soa-infra
oracle.middleware.osb.enabled=true
oracle.middleware.osb.endpoint=http://localhost:7001/osb

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized
management.metrics.export.prometheus.enabled=true

# Logging Configuration
logging.level.com.harborgrid.turboasset=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Oracle Enterprise Features
oracle.enterprise.adf.enabled=true
oracle.enterprise.jet.enabled=true
oracle.enterprise.middleware.integration=true
oracle.enterprise.database.features.json=true
oracle.enterprise.database.features.spatial=true
oracle.enterprise.database.features.text=true